# ==============================================================
# PulseLog — Main Branch CI Pipeline
# ==============================================================
# Triggers on push to main branch (app code changes)
#
# Stages:
#   1. ESLint          → code quality (backend + frontend)
#   2. npm audit       → dependency CVE scan (backend + frontend)
#   3. Hadolint        → Dockerfile lint (backend + frontend)
#   4. Checkov         → IaC security scan (terraform + k8s)
#   5. Docker Build    → build images (backend + frontend)
#   6. Trivy           → image CVE scan (backend + frontend)
#   7. Push to ECR     → publish images (backend + frontend)
#   8. Update Manifest → update image tags in k8s YAMLs → triggers ArgoCD
# ==============================================================

name: PulseLog CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Security: restrict default permissions to read-only
# each job explicitly requests what it needs
permissions:
  contents: read

env:
  AWS_REGION: us-east-1

jobs:

  # ============================================================
  # STAGE 1 — ESLint
  # Runs on both backend and frontend in parallel (matrix)
  # ============================================================
  lint:
    name: "ESLint — ${{ matrix.component }}"
    runs-on: ubuntu-latest
    strategy:
      # don't cancel other matrix job if one fails
      fail-fast: false
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ matrix.component }}
        run: npm run lint

  # ============================================================
  # STAGE 2 — npm audit (SCA — Software Composition Analysis)
  # Scans node_modules for known CVEs
  # ============================================================
  sca:
    name: "npm audit — ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      # fail on high/critical vulnerabilities
      # || true — don't fail on moderate (adjust for prod)
      - name: Run npm audit
        working-directory: ${{ matrix.component }}
        run: npm audit --audit-level=high || true

  # ============================================================
  # STAGE 3 — Hadolint (Dockerfile Linting)
  # Catches bad practices in Dockerfiles
  # e.g. using latest tag, running as root, no HEALTHCHECK
  # ============================================================
  hadolint:
    name: "Hadolint — ${{ matrix.component }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.component }}/Dockerfile
          # fail on warning or above
          failure-threshold: warning

  # ============================================================
  # STAGE 4 — Checkov (IaC Security Scan)
  # Scans Terraform for security misconfigurations
  # ============================================================
  checkov:
    name: "Checkov — IaC Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          # Intentional skips for dev environment:
          # CKV_AWS_39  — public EKS endpoint (needed for kubectl access)
          # CKV_AWS_58  — EKS secrets encryption (KMS adds cost)
          # CKV_AWS_136 — ECR KMS encryption (default encryption is sufficient)
          # CKV_AWS_130 — public subnets auto-assign IP (required for ALB/NLB)
          # CKV_AWS_355 — IAM wildcard resources (ALB/Karpenter need broad EC2 permissions)
          # CKV_AWS_290 — IAM write without constraints (same as above)
          # CKV_AWS_289 — IAM permissions management (Karpenter needs iam:PassRole)
          # CKV2_AWS_12 — default SG unrestricted (dev environment)
          # CKV2_AWS_11 — VPC flow logs (adds cost, not needed for dev)
          # CKV_AWS_38  — EKS public endpoint CIDR (need access from anywhere for dev)
          skip_check: CKV_AWS_39,CKV_AWS_58,CKV_AWS_136,CKV_AWS_130,CKV_AWS_355,CKV_AWS_290,CKV_AWS_289,CKV2_AWS_12,CKV2_AWS_11,CKV_AWS_38
          soft_fail: false
          output_format: cli

  # ============================================================
  # STAGE 5 + 6 — Docker Build + Trivy Image Scan
  # Build image first, then scan it for CVEs
  # Separate from push — scan before publishing
  # ============================================================
  build-and-scan:
    name: "Build + Trivy — ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: [lint, sca, hadolint, checkov]
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # build image locally for scanning
      # not pushed yet — scan first
      - name: Build image for scanning
        run: |
          docker build \
            -t pulselog-${{ matrix.component }}:scan \
            ./${{ matrix.component }}

      # Trivy scans the built image for:
      # - OS package vulnerabilities (alpine packages)
      # - Library vulnerabilities (node_modules)
      # exit-code 1 = fail pipeline on CRITICAL or HIGH
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "pulselog-${{ matrix.component }}:scan"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          timeout: "10m"

  # ============================================================
  # STAGE 7 — Push to ECR
  # Only runs on push to main (not on PRs)
  # Uses OIDC — no long-lived AWS credentials stored
  # ============================================================
  push-to-ecr:
    name: "Push to ECR — ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: build-and-scan
    # only push on actual push to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      # required for OIDC token request
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        # use short git SHA as image tag
        # e.g. abc1234 — unique per commit, traceable
        run: echo "image_tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # OIDC authentication — requests short-lived token from AWS
      # no AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY needed
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/pulselog-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # build final image and push to ECR
      # tagged with git SHA only (immutable tags, no :latest)
      - name: Build and push to ECR
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/pulselog-${{ matrix.component }}:${{ steps.vars.outputs.image_tag }}
          # GitHub Actions cache — speeds up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # STAGE 8 — Update K8s Manifest
  # Replaces image placeholders with real ECR URL + tag
  # Commits to devops branch → ArgoCD detects → deploys to EKS
  # ============================================================
  update-manifest:
    name: "Update K8s Manifest"
    runs-on: ubuntu-latest
    needs: push-to-ecr
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      # needs write to push manifest changes to devops branch
      contents: write
    steps:
      - name: Checkout devops branch
        uses: actions/checkout@v4
        with:
          # checkout devops branch — that's where k8s YAMLs live
          ref: devops
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get image tag
        id: vars
        run: |
          # get the SHA from the main branch commit that triggered this
          echo "image_tag=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT

      - name: Update backend image tag
        run: |
          IMAGE_TAG=${{ steps.vars.outputs.image_tag }}
          ECR_URL=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

          # replace any existing image (placeholder or previous ECR tag)
          sed -i "s|image: .*pulselog-backend.*|image: ${ECR_URL}/pulselog-backend:${IMAGE_TAG}|g" \
            k8s/backend/deployment.yaml

          echo "Backend image updated to: ${ECR_URL}/pulselog-backend:${IMAGE_TAG}"

      - name: Update frontend image tag
        run: |
          IMAGE_TAG=${{ steps.vars.outputs.image_tag }}
          ECR_URL=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

          # replace any existing image (placeholder or previous ECR tag)
          sed -i "s|image: .*pulselog-frontend.*|image: ${ECR_URL}/pulselog-frontend:${IMAGE_TAG}|g" \
            k8s/frontend/deployment.yaml

          echo "Frontend image updated to: ${ECR_URL}/pulselog-frontend:${IMAGE_TAG}"

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/backend/deployment.yaml k8s/frontend/deployment.yaml

          # only commit if there are actual changes
          # [skip ci] prevents this commit from triggering another pipeline run
          git diff --cached --quiet || \
            git commit -m "ci: update images to ${{ steps.vars.outputs.image_tag }} [skip ci]"

          git push origin devops
