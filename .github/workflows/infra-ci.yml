# ==============================================================
# PulseLog — Devops Branch Infra CI Pipeline
# ==============================================================
# Triggers on push to devops branch (infra/k8s changes)
#
# Stages:
#   1. Checkov         → Terraform security scan
#   2. Checkov         → K8s manifest security scan
#   3. kubectl dry-run → validate K8s YAML structure
# ==============================================================

name: PulseLog Infra CI

on:
  push:
    branches: ["devops"]
  pull_request:
    branches: ["devops"]

permissions:
  contents: read

jobs:

  # ============================================================
  # STAGE 1 — Checkov Terraform Scan
  # ============================================================
  checkov-terraform:
    name: "Checkov — Terraform"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          skip_check: CKV_AWS_39,CKV_AWS_58,CKV_AWS_136,CKV_AWS_130,CKV_AWS_355,CKV_AWS_290,CKV_AWS_289,CKV2_AWS_12,CKV2_AWS_11,CKV_AWS_38
          soft_fail: false
          output_format: cli

  # ============================================================
  # STAGE 2 — Checkov K8s Scan
  # ============================================================
  checkov-k8s:
    name: "Checkov — K8s Manifests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on K8s manifests
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s/
          framework: kubernetes
          # soft fail — some checks don't apply to all resources
          soft_fail: true
          output_format: cli

  # ============================================================
  # STAGE 3 — kubectl dry-run
  # Validates K8s YAML structure without a real cluster
  # ============================================================
  kubectl-validate:
    name: "K8s manifest validation"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate K8s manifests
        run: |
          kubeconform -strict -ignore-missing-schemas -summary \
            -ignore-filename-pattern "INSTALL.md" \
            -ignore-filename-pattern "helm-values" \
            k8s/
