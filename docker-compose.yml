# ==============================================================
# PulseLog — Local Development with Docker Compose
# ==============================================================
# Usage:
#   docker compose up --build     → build images and start all services
#   docker compose down           → stop all services
#   docker compose down -v        → stop and wipe DB volume
#   docker compose logs -f        → follow all logs
# ==============================================================

services:

  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    container_name: pulselog-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pulselog_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pulselog_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    tmpfs:
      - /tmp
      - /run

  # ---- Backend API ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pulselog-backend
    restart: unless-stopped
    environment:
      PORT: "5000"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db           # service name — resolves to db container IP
      DB_PORT: "5432"
      DB_NAME: pulselog_db
    expose:
      - "5000"              # internal only — not exposed to host
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # ---- Frontend (Nginx + React) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pulselog-frontend
    restart: unless-stopped
    ports:
      - "80:8080"           # host:container — access at http://localhost
    volumes:
      # Mount nginx.conf at runtime — same approach as K8s ConfigMap
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
    driver: local
