apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulselog-backend
  namespace: pulselog
  labels:
    app.kubernetes.io/name: pulselog-backend
    app.kubernetes.io/part-of: pulselog
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pulselog-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pulselog-backend
        app.kubernetes.io/part-of: pulselog
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: pulselog-backend
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true

      # Karpenter — tolerate Spot node disruption
      tolerations:
        - key: "karpenter.sh/disrupted"
          operator: "Exists"
          effect: "NoSchedule"

      # initContainer runs BEFORE main container
      # waits until postgres-svc:5432 is accepting connections
      # prevents CrashLoopBackOff on startup
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres-svc:5432..."
              until nc -z postgres-svc 5432; do
                echo "DB not ready, retrying in 3s..."
                sleep 3
              done
              echo "DB is ready!"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL

      containers:
        - name: backend
          # CI pipeline replaces this placeholder with real ECR image tag
          # e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/pulselog-backend:abc123
          image: 207446234524.dkr.ecr.us-east-1.amazonaws.com/pulselog-backend:67f78b1
          ports:
            - containerPort: 5000
              protocol: TCP

          env:
            - name: PORT
              value: "5000"
            # DB_HOST = Service name of postgres
            # resolves via CoreDNS: postgres-svc.pulselog.svc.cluster.local
            - name: DB_HOST
              value: "postgres-svc"
            - name: DB_PORT
              value: "5432"
            # DB credentials injected from Secret
            # never hardcode credentials in deployment YAML
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: pulselog-db-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pulselog-db-secret
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: pulselog-db-secret
                  key: POSTGRES_DB

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi

          securityContext:
            allowPrivilegeEscalation: false
            # Node.js app doesn't need root filesystem writes
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            # appuser UID from backend Dockerfile
            runAsUser: 1000
            capabilities:
              drop:
                - ALL

          # liveness — is the Node.js process alive?
          # K8s restarts container if this fails
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          # readiness — is backend ready to serve traffic?
          # K8s removes pod from Service endpoints if this fails
          # no traffic sent to pod until it passes
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
