apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: pulselog
  labels:
    app.kubernetes.io/name: pulselog-backend
    app.kubernetes.io/part-of: pulselog
    app.kubernetes.io/component: backend
spec:
  # ClusterIP — internal only
  # Gateway HTTPRoute uses "backend-svc:5000" to route /api/* traffic
  # frontend nginx uses "backend-svc:5000" as proxy_pass target
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pulselog-backend
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
