apiVersion: v1
kind: Secret
metadata:
  name: pulselog-db-secret
  namespace: pulselog
  labels:
    app.kubernetes.io/part-of: pulselog
    app.kubernetes.io/component: backend
# Opaque = generic key-value secret
type: Opaque
# Values are base64 encoded (NOT encrypted)
# echo -n 'postgres'    | base64 → cG9zdGdyZXM=
# echo -n 'pulselog_db' | base64 → cHVsc2Vsb2dfZGI=
# NOTE: This will be replaced by HashiCorp Vault later
# Vault will inject secrets at runtime — nothing committed to Git
data:
  POSTGRES_USER:     cG9zdGdyZXM=
  POSTGRES_PASSWORD: cG9zdGdyZXM=
  POSTGRES_DB:       cHVsc2Vsb2dfZGI=
