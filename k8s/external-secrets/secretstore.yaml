# -----------------------------------------------
# ClusterSecretStore — tells ESO how to reach AWS Secrets Manager
# Cluster-scoped so any namespace can reference it
# Auth is handled by Pod Identity (no keys, no annotations)
# -----------------------------------------------
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app.kubernetes.io/part-of: pulselog
    app.kubernetes.io/component: secrets-management
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # Auth via Pod Identity — ESO's service account is mapped
      # to an IAM role via aws_eks_pod_identity_association
      # No explicit auth block needed; Pod Identity Agent injects creds
