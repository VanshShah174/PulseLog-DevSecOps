# -----------------------------------------------
# ExternalSecret — syncs AWS Secrets Manager → K8s Secret
# Creates "pulselog-db-secret" in pulselog namespace
# Same name as the old static secret — zero changes to deployments
# -----------------------------------------------
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pulselog-db-secret
  namespace: pulselog
  labels:
    app.kubernetes.io/part-of: pulselog
    app.kubernetes.io/component: backend
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: pulselog-db-secret
    creationPolicy: Owner
    # Opaque — same type as the old static secret
    template:
      type: Opaque

  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: pulselog/db-credentials
        property: POSTGRES_USER

    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: pulselog/db-credentials
        property: POSTGRES_PASSWORD

    - secretKey: POSTGRES_DB
      remoteRef:
        key: pulselog/db-credentials
        property: POSTGRES_DB
