apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pulselog-frontend-hpa
  namespace: pulselog
  labels:
    app.kubernetes.io/name: pulselog-frontend
    app.kubernetes.io/part-of: pulselog
    app.kubernetes.io/component: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pulselog-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  # Scale up fast (traffic spike), scale down slow (avoid flapping)
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
