apiVersion: v1
kind: ConfigMap
metadata:
  name: pulselog-nginx-config
  namespace: pulselog
  labels:
    app.kubernetes.io/name: pulselog-frontend
    app.kubernetes.io/part-of: pulselog
    app.kubernetes.io/component: frontend
data:
  # key = filename that gets mounted inside the container
  # value = full nginx.conf content
  default.conf: |
    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # SPA routing — fallback to index.html for React Router
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to backend Service
        # In K8s: Gateway API routes /api/* directly to backend-svc
        # This proxy_pass is a fallback for direct frontend → backend calls
        location /api/ {
            proxy_pass http://backend-svc:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Security: deny access to dotfiles
        location ~ /\. {
            deny all;
            return 404;
        }
    }
