apiVersion: v1
kind: ServiceAccount
metadata:
  name: pulselog-frontend
  namespace: pulselog
  labels:
    app.kubernetes.io/name: pulselog-frontend
    app.kubernetes.io/part-of: pulselog
    app.kubernetes.io/component: frontend
# Frontend (Nginx) does not need to talk to K8s API
automountServiceAccountToken: false
