apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulselog-frontend
  namespace: pulselog
  labels:
    app.kubernetes.io/name: pulselog-frontend
    app.kubernetes.io/part-of: pulselog
    app.kubernetes.io/component: frontend
spec:
  # replicas managed by HPA (k8s/frontend/hpa.yaml)
  selector:
    matchLabels:
      app.kubernetes.io/name: pulselog-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pulselog-frontend
        app.kubernetes.io/part-of: pulselog
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: pulselog-frontend
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true

      # Karpenter — tolerate Spot node disruption
      tolerations:
        - key: "karpenter.sh/disrupted"
          operator: "Exists"
          effect: "NoSchedule"

      containers:
        - name: frontend
          # CI pipeline replaces this placeholder with real ECR image tag
          # e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/pulselog-frontend:abc123
          image: 207446234524.dkr.ecr.us-east-1.amazonaws.com/pulselog-frontend:34432af
          ports:
            - containerPort: 8080
              protocol: TCP

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

          securityContext:
            allowPrivilegeEscalation: false
            # Nginx needs write access to cache and pid file
            # cannot set readOnlyRootFilesystem: true for nginx
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            # nginx user UID in alpine image
            runAsUser: 101
            capabilities:
              drop:
                - ALL

          # liveness — is nginx process alive?
          # K8s restarts container if this fails
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # readiness — is nginx ready to serve traffic?
          # pod removed from Service endpoints until this passes
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          volumeMounts:
            # mount nginx.conf from ConfigMap
            # subPath ensures only this file is mounted
            # not the entire /etc/nginx/conf.d/ directory
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true

      volumes:
        - name: nginx-config
          configMap:
            name: pulselog-nginx-config
