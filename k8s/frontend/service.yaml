apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: pulselog
  labels:
    app.kubernetes.io/name: pulselog-frontend
    app.kubernetes.io/part-of: pulselog
    app.kubernetes.io/component: frontend
spec:
  # LoadBalancer — creates an AWS NLB to expose frontend to the internet
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: pulselog-frontend
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
