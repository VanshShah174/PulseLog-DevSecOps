apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: pulselog
  labels:
    app.kubernetes.io/name: pulselog-frontend
    app.kubernetes.io/part-of: pulselog
    app.kubernetes.io/component: frontend
spec:
  # ClusterIP — internal only
  # Gateway HTTPRoute routes /* traffic to this service
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pulselog-frontend
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
