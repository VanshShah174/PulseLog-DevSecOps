apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: pulselog
  labels:
    app.kubernetes.io/name: pulselog-postgres
    app.kubernetes.io/part-of: pulselog
    app.kubernetes.io/component: database
spec:
  # ClusterIP — internal only, not accessible outside the cluster
  # backend uses "postgres-svc" as DB_HOST
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pulselog-postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
